<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Day - 2</title>
    <script>
      console.log("// Closures");

      function outer() {
        let name = "Faheem";

        function inner() {
          console.log(name);
        }

        return inner;
      }

      const myFunction = outer();

      myFunction();

      function person(name) {
        return function () {
          console.log("Welcome " + name);
        };
      }

      const p1 = person("Faheem");
      const p2 = person("Ali");

      p1();
      p2();
    </script>
  </head>
  <body></body>
</html>
