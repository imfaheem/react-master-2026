<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise - Async/Await Try - Catch Exercise Practice</title>
</head>
<script>
    // Exercise 1
    Promise.resolve("Hello Faheem")
    .then(res => console.log(res));

    //Exercise 2
    Promise.reject("Something went wrong.")
    .then(res=> console.log(res))
    .catch(res=> console.log(res));

    //Exercise 3
     Promise.resolve(100)
    .then(res => console.log(res));

    //Exercise 4
    Promise.reject("Error")
    .catch(res=> console.log(res));

    //Exercise 5
    Promise.resolve(10)
    .then(res1 => res1 * 2)
    .then(res2 => res2 + 10)
    .then(res => console.log(res));

    //Exercise 6
    Promise.resolve("Faheem")
    .then(res => `Hello ${res}`)
    .then(res => console.log(res));

    //Exercise 7
    Promise.resolve(5)
    .then(res => res * 5)
    .then(res => res * 9)
    .then(res => console.log(res));

    //Exercise 8
    console.log("Loading...");
    const promise1 = new Promise((resolve, reject)=> {
        setTimeout(()=> {
            resolve("Data Loaded")
        }, 2000);
    });
    promise1.then(res => console.log(res));

    //Exercise 9
    const promise2 = new Promise((resolve, reject)=> {
        setTimeout(()=> {
            reject("Server Error")
        }, 3000);
    });
    promise2
        .then(res => console.log(res))
        .catch(err => console.log(err));

    //Exeercise 10
    const random = new Promise((resolve, reject) => {
        const value = Math.random();
        const success = value > 0.5;
        if(success) {
            resolve(`Success!: ${value}`);
        } else {
            reject(`Failed!: ${value}`);
        }
    })
    random
    .then(res => console.log(res))
    .catch(err => console.log(err))

    //Exercise 11
    const func = async ()=> {
        const response = await Promise.resolve("Hello");
        console.log(response);
    }
    func();

    //Exercise 12
    Promise.resolve(10)
    .then(num => num * 2)
    .then(num => console.log(num));

    const result = async ()=> {
        const response = await Promise.resolve(10);
        const data = await response * 2;
        console.log(data);
    }
    result();

    //Exercise 13
    const getData = async ()=> {
        try {
            const response = await fetch("https://jsonplaceholder.typicode.com/users");
            const data = await response.json();
            console.log(data);
        } catch(error) {
            console.log(error);
        }
    }
    getData();

    //Exercise 14
    const great = new Promise((res, rej)=> {
        return "Hello";        
    })

    //Exercise 15
    const getUser = ()=> {
        fetch('url')
        .then(res => res.json())
        .then(data => console.log(data))
        .catch(err => console.log(err));
    }
    getUser();

    //Exercise 16
    const getUserData = ()=> {
        fetch("https://jsonplaceholder.typicode.com/users")
        .then(res => res.json())
        .then(data => console.log(data))
        .catch(error => console.log(error))
    }
    getUserData();

    //Exercise 17
    const getUsersByAsync = async () => {
        try {
            const response = await fetch("https://jsonplaceholder.typicode.com/users");
            const data = await response.json();
            console.log(data);
        } catch(err) {
            console.log(err)
        }
    }
    getUsersByAsync()

    //Exercise 18
    const getUsernames = async (users) => {
        try {
            const response = await fetch(users);
            const data = await response.json();
            const usernames = data.map(({username}) => username);
            console.log(usernames);
        } catch(err) {
            console.log(err)
        }
    }
    getUsernames("https://jsonplaceholder.typicode.com/users")

    //Exercise 19
    function getEmails(emails) {
        fetch(emails)
        .then(res => res.json())
        .then(data => {
            data.map(users => console.log(users.email));
        })
        .catch(err=> console.log(err));
    }
    getEmails("https://jsonplaceholder.typicode.com/users");

    // Exercise 20
    async function firstUser() {
        try {
            const response = await fetch("https://jsonplaceholder.typicode.com/users");
            const data = await response.json();
            const user1 = await data.find(key => key.id === 1);
            console.log(user1);
        } catch(error) {
            console.log(error);
        }
    }
    firstUser();
</script>
<body>
    
</body>
</html>
