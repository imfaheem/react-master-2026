<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day - 6 Mini Project</title>
    <script>
        async function getUsers() {
            try {
                const response = await fetch("https://jsonplaceholder.typicode.com/users");
                const data = await response.json();
                console.log(data);
                data.forEach(({name, email, company, address})=> {
                    console.log(`
Name : ${name}
Email: ${email}
Company: ${company?.name ?? 'NA'}
City: ${address?.city ?? '...'}

==================
                    `);
                });
                const userStartsWithG = await data.filter(user => user.address.city.startsWith("G"));
                console.log(userStartsWithG);
                
            } catch(error) {
                console.log(error);
            } finally {
                console.log("Data Ends...")
            }
        }
        getUsers();
    </script>
</head>

</html>
