<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day - 6 JS</title>
</head>
<script>

function greet() {
    console.log("Hello");
}

function execute(fn) {
    fn(); // Callback is executed immediately
}

execute(greet);

function display(callback) {
    callback();
}

display(() => console.log("Hello"));

// Promise
console.log("// Promise");

// Createing a promise
const promise = new Promise((resolve, reject) => {
    const success = true
    if(success) {
        resolve("Success!!");
    } else {
        reject("Failed...")
    }
})
// Consuming a Promise
promise
    .then(result => console.log(result))
    .catch(error => console.log(error))
    //.finally(() => console.log("This should always be run."));


    Promise.resolve("React")
    .then(data => console.log(data));

    Promise.resolve(true)
    .then(value1 => {
        value2 = value1;
        console.log(value1);
        console.log(value2);
        return "hello";
    })
    .then(value2 => console.log(value2));

    Promise.resolve(2)
    .then(num => {
        console.log(num);
        return num + 3; // 5
    })
    .then(num => {
        console.log(num);
        return num * 5; // 25
    })
    .then(num => {
        console.log(num);   // Output: 25
    });

    async function demo() {
        const value = await Promise.resolve(5);
        console.log(value);
    }

    function demo() {
        Promise.resolve(5)
        .then(value => value)
        .then(value => console.log(value))
        
    }
    
</script>

</body>
</html>
